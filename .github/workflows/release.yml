name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
    - name: Build Release
      working-directory: ./portfolio_tracker
      run: |
        xcodebuild archive \
          -project portfolio_tracker.xcodeproj \
          -scheme portfolio_tracker \
          -archivePath ../build/portfolio_tracker.xcarchive \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
          
    - name: Export App
      working-directory: ./portfolio_tracker
      run: |
        xcodebuild -exportArchive \
          -archivePath ../build/portfolio_tracker.xcarchive \
          -exportPath ../build/export \
          -exportOptionsPlist exportOptions.plist
      continue-on-error: true
      
    - name: Create Zip
      run: |
        cd build/export || cd build/Debug || true
        zip -r ../portfolio_tracker.app.zip portfolio_tracker.app
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: portfolio_tracker.app.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
